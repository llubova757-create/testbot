<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контроль сотрудников</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; text-align: center; margin-bottom: 20px; color: #333; }
        h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
        .screen { display: none; }
        .screen.active { display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
        input:focus, select:focus { outline: none; border-color: #007AFF; }
        button { width: 100%; padding: 14px; background: #007AFF; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 8px; }
        button:hover { background: #0056b3; }
        button.secondary { background: #f5f5f5; color: #333; }
        button.secondary:hover { background: #e5e5e5; }
        .date-display { text-align: center; font-size: 18px; color: #666; margin-bottom: 16px; }
        .name-display { text-align: center; font-size: 14px; color: #999; margin-bottom: 20px; }
        .error { color: #ff3b30; text-align: center; font-size: 14px; margin-bottom: 12px; }
        .success { color: #34c759; text-align: center; font-size: 14px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="registration" class="screen">
            <h1>Регистрация</h1>
            <input type="text" id="firstName" placeholder="Имя" required>
            <input type="text" id="lastName" placeholder="Фамилия" required>
            <button onclick="register()">Сохранить</button>
            <div id="regError" class="error"></div>
        </div>

        <div id="mainMenu" class="screen">
            <h1>Главное меню</h1>
            <div class="name-display" id="userNameDisplay"></div>
            <button onclick="showAddRecord()">Добавить запись</button>
        </div>

        <div id="addRecord" class="screen">
            <h2>Новая запись</h2>
            <div class="date-display" id="currentDate"></div>
            <select id="objectSelect">
                <option value="">Загрузка...</option>
            </select>
            <button onclick="saveRecord()">Сохранить</button>
            <button class="secondary" onclick="showMainMenu()">Отмена</button>
            <div id="saveError" class="error"></div>
            <div id="saveSuccess" class="success"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin || 'http://127.0.0.1:3000';
        let userData = { firstName: '', lastName: '', userId: 0, chatId: 0 };
        let objects = [];

        function init() {
            const stored = localStorage.getItem('userData');
            if (stored) {
                userData = JSON.parse(stored);
                if (userData.firstName && userData.lastName) {
                    showMainMenu();
                    return;
                }
            }
            showRegistration();
            loadUserFromWebApp();
        }

        function loadUserFromWebApp() {
            if (window.WebApp && window.WebApp.initDataUnsafe) {
                const data = window.WebApp.initDataUnsafe;
                if (data.user) {
                    userData.userId = data.user.id || 0;
                }
                if (data.chat) {
                    userData.chatId = data.chat.id || 0;
                }
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showRegistration() { showScreen('registration'); }
        function showMainMenu() { 
            document.getElementById('userNameDisplay').textContent = `${userData.firstName} ${userData.lastName}`;
            showScreen('mainMenu'); 
        }
        function showAddRecord() {
            document.getElementById('saveError').textContent = '';
            document.getElementById('saveSuccess').textContent = '';
            
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('currentDate').textContent = `${day}.${month}.${year} ${hours}:${minutes}`;
            
            loadObjects();
            showScreen('addRecord');
        }

        async function loadObjects() {
            try {
                const response = await fetch(`${SERVER_URL}/objects`);
                const data = await response.json();
                objects = data.objects || [];
                
                const select = document.getElementById('objectSelect');
                select.innerHTML = '<option value="">Выберите объект</option>';
                objects.forEach(obj => {
                    const option = document.createElement('option');
                    option.value = obj;
                    option.textContent = obj;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки объектов:', error);
            }
        }

        function register() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            
            if (!firstName || !lastName) {
                document.getElementById('regError').textContent = 'Введите имя и фамилию';
                return;
            }
            
            userData.firstName = firstName;
            userData.lastName = lastName;
            localStorage.setItem('userData', JSON.stringify(userData));
            
            showMainMenu();
        }

        async function saveRecord() {
            const object = document.getElementById('objectSelect').value;
            if (!object) {
                document.getElementById('saveError').textContent = 'Выберите объект';
                return;
            }
            
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const date = `${day}.${month}.${year}`;
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const time = `${hours}:${minutes}`;
            
            const fullName = `${userData.firstName} ${userData.lastName}`;
            
            try {
                const response = await fetch(`${SERVER_URL}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date,
                        time,
                        name: fullName,
                        userId: userData.userId,
                        chatId: userData.chatId,
                        object
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('saveSuccess').textContent = 'Запись сохранена!';
                    setTimeout(() => {
                        if (window.WebApp) {
                            window.WebApp.close();
                        } else {
                            showMainMenu();
                        }
                    }, 1500);
                } else {
                    document.getElementById('saveError').textContent = result.message || 'Ошибка сохранения';
                }
            } catch (error) {
                document.getElementById('saveError').textContent = 'Ошибка соединения с сервером';
            }
        }

        init();
    </script>
</body>
</html>
